# RCA 归因路径评估问题集：Root Cause Analysis / 根因分析
# 每道题对应一个埋雷事件，自动评估 RCA Agent 的归因能力
#
# 结构：
#   - question: 用户提问（业务人员的自然问题）
#   - related_event: 对应的埋雷事件 ID
#   - expected_root_cause: 期望的根因结论
#   - expected_affected_dimensions: 期望识别的关键维度
#   - evaluation_criteria: 评估标准

evaluation_questions:
  # ============================================================
  # 针对 anxin_90_expire 事件的题目
  # ============================================================

  - id: attribution_q001
    question: |
      上海浦东分行（BR_CITY_0006）的高净值客户活期存款余额在五月中旬出现明显下降。
      请分析主要原因和影响客户群体。
    related_event: anxin_90_expire
    expected_root_cause: |
      安鑫 90 天理财产品在 2026-05-14 到期，导致高净值客户大额赎回。
      根据数据分析，该产品持有者续作率仅 42%，低于历史均值 65%，大部分
      资金流出行外。
    expected_affected_dimensions:
      - branch_id: BR_CITY_0006
      - customer_tier: HIGH_NET_WORTH
    expected_key_metrics:
      - metric: retail_deposit_balance
        change_direction: down
        magnitude: -3.4  # 实测 agent 对齐窗口 (5/11-5/20 vs 5/01-5/10, BR_CITY_0006 × HNW × CURRENT)
        tolerance: "±50%"
    evaluation_criteria:
      - dimension_recall: "Agent 是否识别出 branch_id 和 customer_tier"
      - event_hit: "Agent 是否提到理财产品到期"
      - timing: "Agent 是否识别出 2026-05-14 的特定日期"

  - id: attribution_q002
    question: |
      2026 年 5 月中旬，我们发现某个理财产品的持有余额下降，但同时发现客户
      转入了其他理财产品。这说明了什么？能否定位具体的产品和原因？
    related_event: anxin_90_expire
    expected_root_cause: |
      这是安鑫 90 天理财产品到期后的续作现象。源产品 PROD_WEA_0030/0031
      到期赎回导致客户资金释放；部分客户将资金转入同属 WEALTH 类目的
      其他理财产品。在 WEALTH 大类整体口径下，5/31 vs 4/30 总持有市值
      净下降约 -12.5%，反映"赎回 > 续作"的净流出态势。
    expected_affected_dimensions:
      - product_id: PROD_WEA_0030
      - product_category: WEALTH
    expected_key_metrics:
      - metric: wealth_category_total_market_value  # 全 WEALTH 大类总持有市值
        change_direction: down
        magnitude: -12.54  # 实测 (snapshot 5/31 vs 4/30, p.product_category='WEALTH'); 无产品 ID 泄漏
        tolerance: "±50%"
    evaluation_criteria:
      - product_identification: "Agent 是否精准定位到源产品和目标产品"
      - behavior_pattern: "Agent 是否解释了赎回→续作的行为链条"

  # ============================================================
  # 针对 spring_festival_withdrawal 事件的题目
  # ============================================================

  - id: attribution_q003
    question: |
      2 月 15-23 日期间，我们观察到全行 ATM 和柜面的现金支取明显增加。
      这是异常波动吗？如果是，根因是什么？主要涉及哪些客户群体？
    related_event: spring_festival_withdrawal
    expected_root_cause: |
      这不是异常，而是典型的春节季节性现象。春节假期期间，零售客户大量现金
      支取用于春节走亲访友、红包等消费。Agent 点出零售客层（BASIC/MASS 任一）
      与现金支取渠道（ATM/柜面任一）作为主要影响群体即可，下钻通常会以
      影响最大的那一档代表整体趋势。
    expected_affected_dimensions:
      - customer_tier: [BASIC, MASS]  # top1 命中即可，不要求全列
      - transaction_type: WITHDRAW
      - transaction_channel: [ATM, COUNTER]  # top1 命中即可
    expected_key_metrics:
      - metric: cash_withdrawal_amount
        change_direction: up
        magnitude: 24.59  # 实测 agent 窗口 (2/15-2/23 vs 2/06-2/14, 全行 × ATM+COUNTER × WITHDRAW); 客群是 drill 输出，不在校准 SQL 里
        tolerance: "±50%"
    evaluation_criteria:
      - seasonal_recognition: "Agent 是否识别出春节季节性而非异常"
      - customer_segmentation: "Agent 是否指出零售客层影响较大（BASIC/MASS 任一即可，下钻取最大贡献者）"
      - channel_identification: "Agent 是否提到现金支取主渠道（ATM 或柜面任一即可）"

  - id: attribution_q004
    question: |
      2 月 15 日到月底，我们的日均余额有波动。这与特定的商业事件有关吗？
      能否基于数据模式推断客户行为？
    related_event: spring_festival_withdrawal
    expected_root_cause: |
      2 月 15-23 日的日均余额下降 18%，与春节假期现金支取高峰期完全吻合。
      这反映了零售客户在春节假期期间的大额现金提取行为。期末（2 月 24 日后）
      余额逐步恢复常态，说明现金需求是短期的、可预测的。
    expected_affected_dimensions:
      - customer_tier: [BASIC, MASS]  # top1 命中即可，下钻取最大贡献者
      - transaction_period: "2026-02-15 to 2026-02-23"  # narrative 提及 2 月相关窗口即可
    expected_key_metrics:
      - metric: average_daily_balance
        change_direction: down
        magnitude: -2.99  # 实测 agent 窗口 (2/15-2/28 vs 2/01-2/14, 全行); 客群是 drill 输出，不在校准 SQL 里
        tolerance: "±50%"
    evaluation_criteria:
      - temporal_analysis: "Agent 是否能关联特定时间窗口与业务事件（narrative 提及 2 月相关窗口即视为命中）"
      - customer_behavior: "Agent 是否推断出现金需求的临时性和可预测性"
      - customer_segmentation: "Agent 是否指出零售客层影响较大（BASIC/MASS 任一即可，下钻取最大贡献者）"

  # ============================================================
  # 针对 lpr_cut_q2 事件的题目
  # ============================================================

  - id: attribution_q005
    question: |
      6 月底到 7 月中旬，我们的贷款申请金额开始上升。这背后
      的驱动因素是什么？是营销活动还是政策变化？
    related_event: lpr_cut_q2
    expected_root_cause: |
      二季度 LPR 下调 10bp（6 月 20 日发布），刺激借款人需求。贷款申请金额
      在政策发布后 7-14 天开始明显增长（+12%），反映了政策反应的滞后性。
      个人消费贷款和房屋贷款响应最快，企业贷款响应较慢。这是典型的
      宏观政策向微观行为传导的案例。
    expected_affected_dimensions:
      - transaction_type: LOAN
      - policy_date: "2026-06-20"
    expected_key_metrics:
      - metric: loan_application_amount
        change_direction: up
        delay_days: 7
        magnitude: 12.0  # expected_root_cause 明示 +12%
        tolerance: "±50%"
      - metric: loan_balance
        change_direction: up
        magnitude: 2.0  # 实测 agent 窗口 (6/26-7/20 vs 6/01-6/25, 全行 × LOAN)
        tolerance: "±50%"
    evaluation_criteria:
      - policy_recognition: "Agent 是否识别出 LPR 下调政策"
      - causal_inference: "Agent 是否建立政策与贷款增长的因果关系"
      
  # ============================================================
  # 针对 qixi_deposit_campaign 事件的题目
  # ============================================================

  - id: attribution_q006
    question: |
      8 月中旬，杭州和南京分行的定期存款余额出现明显增长。这是市场
      竞争导致的定期存款流入吗？还是我们的营销活动产生了效果？
    related_event: qixi_deposit_campaign
    expected_root_cause: |
      七夕情侣定期存款营销活动是 8 月中旬杭州和南京分行定期存款余额增长
      的根因。Agent 应识别这是一场以情侣/定期存款为核心的营销活动，
      并把增长归因到活动驱动，而非市场竞争。
    expected_affected_dimensions:
      - branch_id: [BR_CITY_0000, BR_CITY_0002]
      - customer_tier: [MASS, AFFLUENT]
    expected_key_metrics:
      - metric: saving_deposit_balance
        change_direction: up
        magnitude: 6.17  # 实测 P1 视角 (8/11-8/20 vs 8/01-8/10, br.city IN ('杭州','南京') × SAVING);
        tolerance: "±50%"
    evaluation_criteria:
      - campaign_attribution: "Agent 是否将增长归因于七夕营销活动"
      - segmentation: "Agent 是否指出 MASS/AFFLUENT 层的高响应度"

  # ============================================================
  # 混合/困难题：多事件干扰
  # ============================================================

  - id: attribution_q007
    question: |
      5 月 14-20 日期间，全行存款和 AUM 指标都出现了波动。在这 7 天内发生了
      什么？是单一原因还是多个因素共同作用？请分离信号。
    related_events: [anxin_90_expire]  # 可能有多个同期事件
    expected_root_cause: |
      主要原因是安鑫 90 天理财产品到期，但其影响范围受限于高净值客户和
      上海分行（BR_CITY_0006）。全行 AUM 在 5/14-5/20 vs 5/07-5/13 仅微涨
      约 +1.2%，下跌完全集中在 BR_CITY_0006 × HIGH_NET_WORTH 这一震中，
      被其他分行/客层的常规波动稀释成全行净微涨。Agent 应通过 drill 与
      事件匹配把 scope 缩窄到 BR_CITY_0006 + HNW，仅靠"全行 +1%"无法
      触及根因。
    expected_affected_dimensions:
      - branch_id: BR_CITY_0006
      - customer_tier: HIGH_NET_WORTH
    expected_key_metrics:
      - metric: AUM
        change_direction: up
        magnitude: 1.16  # 实测 P1 视角 (5/14-5/20 vs 5/07-5/13, 全行 AUM); P1 看不到事件库，
        #              不会自动缩窄到 BR_CITY_0006 × HNW。Scope 缩窄考点由 G-eval scope rubric 评，
        #              不在 quant 里测——quant 仅校 narrative 报数是否对齐 P1 实际窗口。
        tolerance: "±50%"
    evaluation_criteria:
      - signal_separation: "Agent 是否能分离多个同期因素"
      - scope_delimitation: "Agent 是否精确界定事件的影响范围（而非全行）"