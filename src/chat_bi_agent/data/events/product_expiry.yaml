# 产品到期事件库
# 用于模拟理财产品到期后的客户行为变化（续作/赎回/转换）

events:
  - id: anxin_90_expire
    name: 安鑫90天理财到期
    type: PRODUCT_EXPIRY
    date: 2026-05-14
    description: 短期理财产品普遍到期，触发大额赎回和余额下降
    affected_dimensions:
      branch_id: [BR_CITY_0006]  # 上海分行城分行
      customer_tier: [HIGH_NET_WORTH, AFFLUENT]
      product_id: [PROD_WEA_0030, PROD_WEA_0031]

    propagation:
      # 主体效应：存款余额下降
      - target_table: fct_balance_daily
        target_column: balance
        metric_name: retail_deposit_balance
        delta: -8.5  # -8.5% 下降幅度
        delay_days: 1
        ramp_days: 3  # 渐变 3 天，不是一天到位
        ramp_type: linear
        renewal_rate: 0.42  # 42% 客户续作其他产品，不完全流出
        affected_account_sample: 1.0  # 锚定队列全部触达，verify_events 才能落入容差
        effect_type: sustained
        product_subcategories: [活期存款]

      # 进阶效应：部分续作到其他产品
      - target_table: fct_balance_daily
        target_column: balance
        metric_name: wealth_product_balance
        delta: 1.8  # +1.8% 其他理财产品余额增加
        delay_days: 3
        affected_account_sample: 0.25  # 仅 25% 续作率
        related_products: [PROD_WEA_0032, PROD_WEA_0033]  # 续作流向（叙事元数据）
        product_subcategories: [短期理财]  # 与 related_products 一致；防止溢出到活期存款验证
        effect_type: sustained

      # 持仓快照效应：续作目标产品在到期后的月末快照上 market_value 上抬
      # （体现资金从 PROD_WEA_0030/0031 转入 PROD_WEA_0032/0033）
      # 注意：rule 级显式 branch_ids/customer_tiers=[] 覆盖事件级的
      # BR_CITY_0006 + HNW/AFFLUENT，让续作信号跨全行/全 tier 可见——
      # 真实业务里资金转入不局限于上海私行；事件级 scope 留给 fct_balance_daily 主体效应。
      - target_table: fct_holding
        target_column: market_value
        metric_name: renewal_market_value
        delta: 15.0  # +15% 续作目标产品市值
        delay_days: 0
        ramp_days: 0
        affected_account_sample: 1.0
        product_ids: [PROD_WEA_0032, PROD_WEA_0033]
        branch_ids: []      # 显式无过滤
        customer_tiers: []  # 显式无过滤
        effect_type: sustained

    required_population:
      min_customers: 50  # 降低 verify AVG 噪声底（√50→±14% vs √20→±22%）
      branches: [BR_CITY_0006]
      tiers: [HIGH_NET_WORTH, AFFLUENT]
      must_hold:
        - product_subcategory: 活期存款
        - product_ids: [PROD_WEA_0030, PROD_WEA_0031]

    # 评估标准：归因 Agent 是否能识别这个根因
    expected_rca_conclusion: |
      上海分行高净值客户的活期存款下降 8.5%，主要原因是「安鑫 90 天」
      理财产品在 2026-05-14 达到到期日期。历史数据显示，该产品历史到期客户
      续作率仅 42%（低于行业均值 65%），大部分资金流出行外，仅小部分客户
      在 3 天内转入其他理财产品。

    expected_main_dimensions:
      - branch_id: BR_CITY_0006
      - product_id: PROD_WEA_0030
      - customer_tier: HIGH_NET_WORTH

  - id: qixi_deposit_campaign
    name: 七夕情侣定期存款活动
    type: MARKETING_EVENT
    date: 2026-08-10
    description: 营销活动拉动定期存款
    affected_dimensions:
      branch_id: [BR_CITY_0000, BR_CITY_0002]  # 杭州、南京分行
      customer_tier: [MASS, AFFLUENT]

    propagation:
      - target_table: fct_balance_daily
        target_column: balance
        metric_name: saving_deposit_balance
        delta: 12.0  # +12% 定期存款增长
        delay_days: 2
        ramp_days: 5
        affected_account_sample: 1.0  # 锚定队列全部触达，verify_events 才能落入容差
        product_ids: [PROD_DEP_0005, PROD_DEP_0008]  # 精确过滤：营销只拉动主推两款，不波及其他定期存款
        related_products: [PROD_DEP_0005, PROD_DEP_0008]  # rca_evaluator alias 种子（narrator 提"七夕营销"也算命中这两个 ID）
        effect_type: sustained

      # 营销响应效应：活动窗内被触达的目标客户 conversion_amount 显著上抬
      - target_table: fct_campaign_response
        target_column: conversion_amount
        metric_name: qixi_conversion_amount
        delta: 60.0  # +60% 转化金额（活动期 MASS/AFFLUENT 在主推两款上的应募）
        delay_days: 0
        ramp_days: 9  # 覆盖 8 月 10-19 日活动窗
        affected_account_sample: 1.0
        product_ids: [PROD_DEP_0005, PROD_DEP_0008]
        effect_type: transient

    required_population:
      min_customers: 50  # 降低 verify AVG 噪声底
      branches: [BR_CITY_0000, BR_CITY_0002]
      tiers: [MASS, AFFLUENT]
      must_hold:
        - product_ids: [PROD_DEP_0005, PROD_DEP_0008]

    expected_rca_conclusion: |
      杭州、南京分行 MASS 层客户定期存款在 2026-08-10 前后出现明显增长（+12%）。
      根因是「七夕情侣定期存款」营销活动，该活动在抖音和微信朋友圈投放高强度广告，
      客户响应延迟 2-5 天。活动对 MASS 层和 AFFLUENT 层均有拉动，但 BASIC 层客户
      响应度较低。

    expected_main_dimensions:
      - branch_id: BR_CITY_0000
      - customer_tier: MASS
      - channel: MOBILE

  - id: lpr_cut_q2
    name: 二季度 LPR 下调 10bp
    type: MACRO_EVENT
    date: 2026-06-20
    description: 央行政策利率下调，刺激贷款投放
    affected_dimensions:
      branch_id: []  # 全行影响
      customer_tier: []  # 全客户层级

    propagation:
      - target_table: fct_transaction
        target_column: amount
        # 注意：propagation 只对已存在行做 amount × 1.12，并不会"增加 LOAN 行数"。
        # 因此真实可观测的信号是 SUM(amount) 上升 12%，不是 COUNT(*) 上升 12%。
        # metric_name 改为 amount，避免下游解读成"申请笔数"。
        metric_name: loan_application_amount
        delta: 12.0  # +12% 贷款申请金额（amount）
        delay_days: 7  # 政策反应滞后 7 天
        ramp_days: 14
        transaction_type: LOAN
        affected_account_sample: 0.25  # 25% LOAN 客户响应 LPR 政策（提调高于 0.08）

      - target_table: fct_balance_daily
        target_column: balance
        metric_name: loan_balance
        delta: 5.5  # +5.5% 贷款余额增长
        delay_days: 14
        ramp_days: 21
        affected_account_sample: 1.0  # 锚定队列全部触达，verify_events 才能落入容差
        effect_type: sustained
        product_subcategories: [个人贷款, 房屋贷款, 小微贷款]

    required_population:
      min_customers: 80  # 强制锚定 LOAN 队列，降低 verify_events 噪声底
      tiers: [BASIC, MASS, AFFLUENT, HIGH_NET_WORTH]  # 显式全 4 层；事件是"全行"覆盖
      must_hold:
        - product_category: LOAN
      must_have_transactions:
        type: LOAN
        min_txn_per_customer: 2

    expected_rca_conclusion: |
      2026 年二季度，全行贷款申请金额在 6 月中旬开始上升，较月初增长 12%，
      贷款余额也随之上升 5.5%。根本原因是 LPR 于 2026-06-20 下调 10bp，
      虽然政策信号立即发出，但客户行为变化存在 1-2 周的滞后。特别是
      个人消费贷款和房屋贷款申请金额增长最快，企业贷款响应较慢。

  - id: spring_festival_withdrawal
    name: 春节大额现金支取
    type: SEASONAL_EVENT
    date: 2026-02-15
    description: 春节传统放假，客户大额取现备年货
    affected_dimensions:
      customer_tier: [BASIC, MASS]  # 主要影响零售客户
      branch_level: [SUBBRANCH, CITY]  # 网点级别明显

    propagation:
      - target_table: fct_transaction
        target_column: amount
        metric_name: cash_withdrawal_amount
        delta: 25.0  # +25% 现金支取金额
        delay_days: 0  # 从腊月廿八（2月15日）开始
        ramp_days: 9   # 覆盖9天（2月15-23日）
        ramp_type: flat  # 春节"集中性脉冲"——整 9 天满额 +25%，不做 0→1 渐变
        transaction_type: WITHDRAW
        transaction_channel: [ATM, COUNTER]
        affected_account_sample: 0.65  # 65% BASIC/MASS 客户春节集中取现（提调高于 0.45）

      - target_table: fct_balance_daily
        target_column: balance
        metric_name: daily_balance
        delta: -18.0  # -18% 期末余额下降
        delay_days: 0
        ramp_days: 9   # 与现金取现规则同步 9 天
        ramp_type: flat
        affected_account_sample: 0.65  # 与现金取现规则一致

    required_population:
      min_customers: 50
      tiers: [BASIC, MASS]
      branch_levels: [SUBBRANCH, CITY]
      must_hold:
        - product_subcategory: 活期存款
      must_have_transactions:
        type: WITHDRAW
        channels: [ATM, COUNTER]
        min_txn_per_customer: 5
        # 显式注入窗口：verify_events 春节用 14 天 baseline (2/01-2/14) + 9 天 event (2/15-2/23)
        # 窗口跨 prior 14 天 + event 9 天 → 5 次注入按 k*7%24 偏移 = 3 在 prior + 2 在 event
        # 数学：event_daily/prior_daily = 1.25 × 2/9 / (3/14) ≈ 1.30 → PoP +30% (在 ±30% 容差内)
        injection_offset_start_days: -14
        injection_offset_end_days: 9

    expected_rca_conclusion: |
      春节假期期间（2026-02-15 至 2026-02-23），现金支取量明显增加 25%，
      柜面和 ATM 交易量都很高。这是典型的春节季节性现象，主要涉及
      BASIC 和 MASS 层零售客户。期末余额在 2026-02-24 左右返回常态。
      与天气、促销等因素无关，纯粹是传统文化驱动的现金需求。
