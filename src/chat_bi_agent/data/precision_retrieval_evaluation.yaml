# P1 精准取数集：Precision Data Retrieval
# 每道题测试 NL2SQL Agent 的精准取数能力
# 结构：
#   - question: 用户提问（中文自然语言查询）
#   - expected_sql: 参考 SQL（Agent 应生成等价的 SQL）
#   - expected_result_columns: 期望返回的列名
#   - expected_result_count: 期望返回的行数范围
#   - expected_filters: 期望应用的过滤条件
#   - evaluation_criteria: 评估标准

evaluation_questions:
  # ============================================================
  # 基础维度导航类题目
  # ============================================================

  - id: precision_q001
    question: |
      查询上海分行（BR_CITY_0006）所有高净值客户的客户 ID、姓名和客户等级。
    expected_sql: |
      SELECT customer_id, customer_name, customer_tier
      FROM dim_customer
      WHERE branch_id = 'BR_CITY_0006'
        AND customer_tier = 'HIGH_NET_WORTH'
    expected_result_columns: [customer_id, customer_name, customer_tier]
    expected_filters:
      - branch_id: BR_CITY_0006
      - customer_tier: HIGH_NET_WORTH
    expected_result_count:
      min: 8
      max: 15
    evaluation_criteria:
      - table_selection: "Agent 是否正确选择 dim_customer 表"
      - filter_accuracy: "Agent 是否正确应用两个过滤条件"
      - column_selection: "Agent 是否选择了正确的列"
      - no_unnecessary_joins: "Agent 是否避免了不必要的 JOIN"

  - id: precision_q002
    question: |
      统计有多少个产品分类为 '理财' 且风险等级为 'MEDIUM'？
    expected_sql: |
      SELECT COUNT(*) as product_count
      FROM dim_product
      WHERE product_category = '理财'
        AND risk_level = 'MEDIUM'
    expected_result_columns: [product_count]
    expected_filters:
      - product_category: 理财
      - risk_level: MEDIUM
    expected_result_count:
      min: 1
      max: 1
    evaluation_criteria:
      - aggregation_function: "Agent 是否使用了 COUNT 聚合函数"
      - filter_conditions: "Agent 是否正确组合了两个过滤条件（AND）"
      - alias_clarity: "Agent 是否为聚合结果提供了清晰的别名"

  # ============================================================
  # 时间窗口过滤类题目
  # ============================================================

  - id: precision_q003
    question: |
      查询 2026 年 5 月 14 日当天发生的所有交易，返回交易 ID、账户 ID、交易金额和交易类型。
    expected_sql: |
      SELECT transaction_id, account_id, amount, transaction_type
      FROM fct_transaction
      WHERE dt = DATE '2026-05-14'
    expected_result_columns: [transaction_id, account_id, amount, transaction_type]
    expected_filters:
      - dt: "2026-05-14"
    expected_result_count:
      min: 10
      max: 200
    evaluation_criteria:
      - date_filter: "Agent 是否正确理解日期过滤条件"
      - exact_match: "Agent 是否使用了等号（=）而非范围"
      - column_relevance: "Agent 返回的列是否与问题相关"

  - id: precision_q004
    question: |
      找出 2026 年 2 月 15-23 日期间，交易渠道为 ATM 或 COUNTER 的现金支取交易。
      返回交易日期、账户 ID、金额和交易渠道。
    expected_sql: |
      SELECT dt, account_id, amount, transaction_channel
      FROM fct_transaction
      WHERE dt >= DATE '2026-02-15'
        AND dt <= DATE '2026-02-23'
        AND transaction_type = 'WITHDRAW'
        AND transaction_channel IN ('ATM', 'COUNTER')
    expected_result_columns: [dt, account_id, amount, transaction_channel]
    expected_filters:
      - dt_range: ["2026-02-15", "2026-02-23"]
      - transaction_type: WITHDRAW
      - transaction_channel: [ATM, COUNTER]
    expected_result_count:
      min: 50
      max: 500
    evaluation_criteria:
      - date_range: "Agent 是否正确处理了日期范围（BETWEEN 或 >= AND <=）"
      - multi_value_filter: "Agent 是否使用了 IN 或 OR 处理多个渠道"
      - logical_combination: "Agent 是否正确组合了 AND 和 IN 条件"

  # ============================================================
  # 多表关联+维度导航题目
  # ============================================================

  - id: precision_q005
    question: |
      杭州分行（BR_CITY_0000）在 2026 年 8 月的定期存款余额总和是多少？
    expected_sql: |
      SELECT COALESCE(SUM(balance), 0) as total_balance
      FROM fct_balance_daily fbd
      JOIN dim_account da ON fbd.account_id = da.account_id
      WHERE da.branch_id = 'BR_CITY_0000'
        AND EXTRACT(YEAR FROM fbd.dt) = 2026
        AND EXTRACT(MONTH FROM fbd.dt) = 8
        AND da.account_type = '定期存款'
    expected_result_columns: [total_balance]
    expected_filters:
      - branch_id: BR_CITY_0000
      - year: 2026
      - month: 8
      - account_type: 定期存款
    expected_result_count:
      min: 1
      max: 1
    evaluation_criteria:
      - join_correctness: "Agent 是否正确 JOIN dim_account 表"
      - time_extraction: "Agent 是否正确提取年月"
      - aggregation: "Agent 是否使用了 SUM 函数并处理 NULL"
      - account_type_filter: "Agent 是否按账户类型过滤"

  - id: precision_q006
    question: |
      统计杭州（BR_CITY_0000）和南京（BR_CITY_0002）分行的 MASS 层客户数量。
    expected_sql: |
      SELECT branch_id, COUNT(DISTINCT customer_id) as customer_count
      FROM dim_customer
      WHERE branch_id IN ('BR_CITY_0000', 'BR_CITY_0002')
        AND customer_tier = 'MASS'
      GROUP BY branch_id
    expected_result_columns: [branch_id, customer_count]
    expected_filters:
      - branch_id: [BR_CITY_0000, BR_CITY_0002]
      - customer_tier: MASS
    expected_result_count:
      min: 2
      max: 2
    evaluation_criteria:
      - grouping: "Agent 是否正确使用了 GROUP BY"
      - distinct_counting: "Agent 是否使用了 DISTINCT 避免重复计数"
      - multi_filter: "Agent 是否正确处理了多分支过滤"

  # ============================================================
  # 复杂聚合 + 排序题目
  # ============================================================

  - id: precision_q007
    question: |
      按产品分类统计各类产品的平均风险等级评分，并按评分从高到低排序。
    expected_sql: |
      SELECT product_category, AVG(risk_score) as avg_risk_score
      FROM dim_product
      WHERE product_category IS NOT NULL
      GROUP BY product_category
      ORDER BY avg_risk_score DESC
    expected_result_columns: [product_category, avg_risk_score]
    expected_filters: []
    expected_result_count:
      min: 3
      max: 10
    evaluation_criteria:
      - aggregation_with_grouping: "Agent 是否正确使用了 AVG + GROUP BY"
      - ordering: "Agent 是否按 DESC 排序"
      - null_handling: "Agent 是否过滤了 NULL 值"

  - id: precision_q008
    question: |
      列出 2026 年 5 月 14 日前后（前 7 天、后 7 天）定期存款余额变化最大的账户，
      返回账户 ID、初始余额、末日余额和变化百分比。
    expected_sql: |
      SELECT
        account_id,
        MIN(CASE WHEN dt < '2026-05-14' THEN balance END) as start_balance,
        MAX(CASE WHEN dt >= '2026-05-14' THEN balance END) as end_balance,
        ROUND(
          (MAX(CASE WHEN dt >= '2026-05-14' THEN balance END) -
           MIN(CASE WHEN dt < '2026-05-14' THEN balance END)) /
          NULLIF(MIN(CASE WHEN dt < '2026-05-14' THEN balance END), 0) * 100, 2
        ) as change_pct
      FROM fct_balance_daily
      WHERE dt >= DATE '2026-05-07'
        AND dt <= DATE '2026-05-21'
      GROUP BY account_id
      ORDER BY ABS(change_pct) DESC
      LIMIT 10
    expected_result_columns: [account_id, start_balance, end_balance, change_pct]
    expected_filters:
      - dt_range: ["2026-05-07", "2026-05-21"]
    expected_result_count:
      min: 1
      max: 10
    evaluation_criteria:
      - window_analysis: "Agent 是否正确定义了时间窗口"
      - calculated_fields: "Agent 是否计算了百分比变化"
      - complex_aggregation: "Agent 是否使用了条件聚合（CASE WHEN）"
      - ordering_and_limit: "Agent 是否按变化幅度排序并限制行数"
